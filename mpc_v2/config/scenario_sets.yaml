sensitivity_sets:
  terminal_soc:
    case_prefix: terminal_soc
    base:
      controller_type: mpc
      pv_error_sigma: 0.0
      tariff_multiplier: 1.0
      outdoor_offset_c: 0.0
      pv_scale: 1.0
    matrix:
      closed_loop_steps: [96, 288, 672]
      horizon_steps: [96, 144, 192]
      w_terminal: [50000, 10000, 1000, 100]
      soc_target: [0.50, 0.40, 0.30]
      w_cycle: [0.001, 0.005, 0.01]
  pv_priority:
    case_prefix: pv_priority
    base:
      controller_type: mpc
      pv_error_sigma: 0.05
      tariff_multiplier: 1.0
      outdoor_offset_c: 0.0
      closed_loop_steps: 96
      horizon_steps: 96
    matrix:
      pv_scale: [1, 2, 3, 5]
      w_spill: [0.02, 0.2, 1.0, 5.0]
  peak_cap:
    case_prefix: peak_cap
    base:
      controller_type: mpc
      pv_error_sigma: 0.0
      closed_loop_steps: 96
      horizon_steps: 96
    matrix:
      peak_cap_kw: ["", 3000, 2800, 2600]
